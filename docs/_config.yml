# Site settings
title: "Domino on Linux"
description: Community guide - Practical, proven approaches to running HCL Domino on Linux

url: "https://nashcom.github.io"
baseurl: "/nsh-domino-linux"

permalink: pretty

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 5
  preview_words_before: 10
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation / UI
heading_anchors: true
nav_sort: case_insensitive

# Footer / navigation helpers
back_to_top: true
back_to_top_text: "Back to top"
next_page: true

footer_content: "Domino on Linux"

# GitHub edit links
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/nashcom/nsh-domino-linux"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Color scheme (default light)
color_scheme: nil

# Build settings
exclude:
  - "*.gemspec"
  - "*.gem"
  - "Gemfile"
  - "Gemfile.lock"
  - "lib/"
  - "bin/"
  - "README.md"
  - "Rakefile"

# Markdown / syntax highlighting
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Analytics (optional)
ga_tracking_anonymize_ip: true