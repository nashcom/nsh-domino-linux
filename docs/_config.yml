# Site settings
remote_theme: pmarsceill/just-the-docs
title: Domino on Linux
description: Community guide - Practical, proven approaches to running HCL Domino on Linux
baseurl: "/domino-linux"
url: "https://nashcom.github.io"

# Just the Docs theme settings
color_scheme: nil
search_enabled: true
search:
  heading_level: 2
  previews: 5
  preview_words_before: 10
  preview_words_after: 10
  rel_url: true
  button: false

# Heading anchors
heading_anchors: true

# Aux links for the upper right navigation
aux_links:
  "View on GitHub":
    - "https://github.com/nashcom/domino-linux"

aux_links_new_tab: true

# Navigation sort
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "Community guide complementing <a href=\"https://opensource.hcltechsw.com/domino-linux/\">HCL's official Domino Linux documentation</a>"

# Edit on GitHub
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/nashcom/domino-linux"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Plugins
plugins:
  - jekyll-seo-tag

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
