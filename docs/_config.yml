
# Site settings
theme: jekyll-theme-minimal
remote_theme: pmarsceill/just-the-docs
title: Domino on Linux
description: Community guide - Practical, proven approaches to running HCL Domino on Linux
version: 1.0
git_url: "https://github.com/nashcom/domino-linux"
baseurl: "/domino-linux"
permalink: pretty
exclude:
  [
    "*.gemspec",
    "*.gem",
    "Gemfile",
    "Gemfile.lock",
    "lib/",
    "bin/",
    "README.md",
    "Rakefile",
  ]

search_enabled: true
search:
  heading_level: 2
  previews: 5
  preview_words_before: 10
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Enable or disable heading anchors
heading_anchors: true

# Aux links for the upper right navigation
aux_links:
  "HCL Domino Linux":
    - "https://opensource.hcltechsw.com/domino-linux/"

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: true

# Sort order for navigation links
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

next_page: true

footer_content: "Community guide for Domino on Linux"

# Footer "Edit this page on GitHub" link text
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/nashcom/domino-linux"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Color scheme currently only supports "dark", "light"/nil (default), or a custom scheme that you define
color_scheme: nil

# Google Analytics Tracking (optional)
ga_tracking_anonymize_ip: true

plugins:
  - jekyll-seo-tag

highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
