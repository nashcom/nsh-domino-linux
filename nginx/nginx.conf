worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {} 
http { 

    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     10m;
    ssl_ciphers             HIGH:!aNULL:!MD5; 
    ssl_protocols           TLSv1.2 TLSv1.3; 
    ssl_verify_client       off;

    proxy_read_timeout      60;
    proxy_ssl_name          $server_name;
    proxy_ssl_server_name   on;
    proxy_ssl_protocols     TLSv1.2 TLSv1.3;
    proxy_ssl_ciphers       HIGH:!aNULL:!MD5;
    proxy_ssl_session_reuse on;

    proxy_ssl_verify        off;
    proxy_ssl_verify_depth  1;

    proxy_ssl_trusted_certificate /local/nginx/trusted_all.pem;

    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    # -----------------------

    upstream traveler.lab.dnug.eu { 
        server 127.0.0.1:444; 
    } 

    upstream linus.lab.dnug.eu { 
        server 127.0.0.1:444; 
    } 

    upstream oidc.lab.dnug.eu { 
        server 127.0.0.1:444; 
    } 

    upstream harbor {
        server 5.75.152.253:443; 
    }

    upstream totp {
        server 5.75.152.253:445;
    }

    upstream k8s {
        server 10.0.0.6:443; 
    }

    upstream restapi {
        server 10.0.0.8:8880;
    }

    upstream verse-extern {
        server 10.0.0.8:445;
    }

    upstream nomad-extern {
        server 10.0.0.8:9443;
    }


    # -----------------------

    # Redirect HTTP to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------

    server { 

        listen       443 ssl; 
        server_name  traveler.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem; 
        ssl_certificate_key     /local/nginx/star-dnug.key; 

        location / {
            proxy_pass  https://traveler.lab.dnug.eu;
            proxy_ssl_verify off;

            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    } 

    server {

        listen       443 ssl;
        server_name  linus.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_read_timeout 240;
            proxy_send_timeout 120;
            proxy_pass  https://linus.lab.dnug.eu;
            proxy_ssl_verify off;

            proxy_http_version 1.1;
            #proxy_set_header Upgrade $http_upgrade;
            #proxy_set_header Connection $connection_upgrade;

            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }


    server {

        listen       443 ssl;
        server_name  harbor.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        # disable any limits to avoid HTTP 413 for large image uploads
        client_max_body_size 0;

        # required to avoid HTTP 411: see Issue #1486 (https://github.com/moby/moby/issues/1486)
        chunked_transfer_encoding on;

        location / {
            proxy_pass         https://harbor;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    server {

        listen       443 ssl;
        server_name  rancher.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_pass         https://k8s;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    server {

        listen       443 ssl;
        server_name  restapi.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_pass         http://restapi;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    server {

        listen       443 ssl;
        server_name  oidc.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_pass         https://oidc.lab.dnug.eu;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
            #proxy_cookie_redirect oidc.lab.dnug.eu lab.dnug.eu;
            proxy_cookie_path ~^(.+)$ "$1; domain=lab.dnug.eu";
        }
    }

    server {

        listen       443 ssl;
        server_name  verse-extern.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_pass         https://verse-extern;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    server {

        listen       443 ssl;
        server_name  totp.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location / {
            proxy_pass         https://totp;
            proxy_ssl_name     $server_name;
            proxy_set_header   Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }


    server {

        listen       443 ssl;
        server_name  nomad-extern.lab.dnug.eu;

        ssl_certificate         /local/nginx/star-dnug.pem;
        ssl_certificate_key     /local/nginx/star-dnug.key;

        location = /auth {
            internal;
            proxy_pass https://oidc.lab.dnug.eu/cgi-bin/auth.sh;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_intercept_errors on;
        }

        location / {
            error_page 401      https://oidc.lab.dnug.eu/names.nsf;
            error_page 403      https://oidc.lab.dnug.eu/names.nsf;
            auth_request        /auth;
            auth_request_set    $auth_status $upstream_status;

            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;

            proxy_pass          https://nomad-extern;
            proxy_ssl_name      $server_name;
            proxy_set_header    Host $server_name;
            proxy_set_header    X-Real-IP $remote_addr;
        }
    }


} 
